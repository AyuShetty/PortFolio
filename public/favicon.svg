<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Ayush Shetty Portfolio">
  <!-- Dark background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f7a63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b3d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6d5b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4c5a0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#grad1)" />
  
  <!-- Modern geometric design - interconnected nodes -->
  <!-- Center circle -->
  <circle cx="32" cy="32" r="8" fill="url(#grad2)" opacity="0.95" />
  
  <!-- Top-left node -->
  <circle cx="20" cy="20" r="5" fill="url(#grad2)" opacity="0.8" />
  
  <!-- Top-right node -->
  <circle cx="44" cy="20" r="5" fill="url(#grad2)" opacity="0.8" />
  
  <!-- Bottom-left node -->
  <circle cx="20" cy="44" r="5" fill="url(#grad2)" opacity="0.8" />
  
  <!-- Bottom-right node -->
  <circle cx="44" cy="44" r="5" fill="url(#grad2)" opacity="0.8" />
  
  <!-- Connection lines -->
  <line x1="32" y1="32" x2="20" y2="20" stroke="#e6d5b8" stroke-width="1.5" opacity="0.6" />
  <line x1="32" y1="32" x2="44" y2="20" stroke="#e6d5b8" stroke-width="1.5" opacity="0.6" />
  <line x1="32" y1="32" x2="20" y2="44" stroke="#e6d5b8" stroke-width="1.5" opacity="0.6" />
  <line x1="32" y1="32" x2="44" y2="44" stroke="#e6d5b8" stroke-width="1.5" opacity="0.6" />
  
  <!-- Connecting outer nodes -->
  <line x1="20" y1="20" x2="44" y2="20" stroke="#e6d5b8" stroke-width="1" opacity="0.4" />
  <line x1="20" y1="44" x2="44" y2="44" stroke="#e6d5b8" stroke-width="1" opacity="0.4" />
  <line x1="20" y1="20" x2="20" y2="44" stroke="#e6d5b8" stroke-width="1" opacity="0.4" />
  <line x1="44" y1="20" x2="44" y2="44" stroke="#e6d5b8" stroke-width="1" opacity="0.4" />
</svg>
